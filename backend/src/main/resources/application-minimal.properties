# Minimal configuration for initial startup
spring.application.name=BobCarRental Backend (Minimal Mode)

# Database - H2 in-memory
spring.datasource.url=jdbc:h2:mem:bobcarrental
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.root=INFO
logging.level.com.bobcarrental=DEBUG
logging.level.org.springframework.security=DEBUG

# Exclude problematic components temporarily
spring.autoconfigure.exclude=\
  com.bobcarrental.controller.VehicleTypeController,\
  com.bobcarrental.controller.BookingController,\
  com.bobcarrental.controller.ClientController,\
  com.bobcarrental.service.impl.AccountServiceImpl,\
  com.bobcarrental.service.impl.FareCalculationServiceImpl,\
  com.bobcarrental.service.impl.VehicleTypeServiceImpl,\
  com.bobcarrental.service.impl.BookingServiceImpl,\
  com.bobcarrental.service.impl.TripSheetServiceImpl,\
  com.bobcarrental.service.impl.VehicleImageServiceImpl

