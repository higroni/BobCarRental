databaseChangeLog:
  - changeSet:
      id: 006-create-vehicle-images-table
      author: bob
      changes:
        - createTable:
            tableName: vehicle_images
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vehicle_type_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_vehicle_images_vehicle_type
                    references: vehicle_types(id)
              - column:
                  name: image_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: image_data
                  type: BLOB
                  constraints:
                    nullable: false
              - column:
                  name: thumbnail_data
                  type: BLOB
              - column:
                  name: thumbnail_size
                  type: BIGINT
              - column:
                  name: upload_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: width
                  type: INTEGER
              - column:
                  name: height
                  type: INTEGER
              - column:
                  name: thumbnail_width
                  type: INTEGER
              - column:
                  name: thumbnail_height
                  type: INTEGER
              - column:
                  name: display_order
                  type: INTEGER
                  defaultValueNumeric: 0
              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - createIndex:
            indexName: idx_vehicle_images_vehicle_type
            tableName: vehicle_images
            columns:
              - column:
                  name: vehicle_type_id
        - createIndex:
            indexName: idx_vehicle_images_is_primary
            tableName: vehicle_images
            columns:
              - column:
                  name: is_primary

# Made with Bob