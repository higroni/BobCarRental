databaseChangeLog:
  - changeSet:
      id: 016-add-version-columns
      author: bob
      changes:
        # Add version column to roles table
        - addColumn:
            tableName: roles
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

