databaseChangeLog:
  - changeSet:
      id: 010-create-accounts-table
      author: bob
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: desc
                  type: VARCHAR(15)
                  constraints:
                    nullable: false
              - column:
                  name: num
                  type: BIGINT
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: client_id
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: client_fk
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_accounts_client
                    references: clients(id)
              - column:
                  name: recd
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: bill
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: tagged
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: code
                  type: VARCHAR(20)
                  constraints:
                    unique: true
              - column:
                  name: account_type
                  type: VARCHAR(20)
              - column:
                  name: name
                  type: VARCHAR(100)
              - column:
                  name: parent_account_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_accounts_parent
                    references: accounts(id)
              - column:
                  name: current_balance
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - createIndex:
            indexName: idx_account_client_id
            tableName: accounts
            columns:
              - column:
                  name: client_id
        - createIndex:
            indexName: idx_account_num
            tableName: accounts
            columns:
              - column:
                  name: num
        - createIndex:
            indexName: idx_account_date
            tableName: accounts
            columns:
              - column:
                  name: date
        - createIndex:
            indexName: idx_account_desc
            tableName: accounts
            columns:
              - column:
                  name: desc

# Made with Bob