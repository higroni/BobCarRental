databaseChangeLog:
  - changeSet:
      id: 009-create-billings-table
      author: bob
      changes:
        - createTable:
            tableName: billings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: bill_num
                  type: INTEGER
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: bill_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: client_id
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: client_fk
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_billings_client
                    references: clients(id)
              - column:
                  name: bill_img
                  type: TEXT
              - column:
                  name: trp_num
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: trip_sheet_fk
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_billings_trip_sheet
                    references: trip_sheets(id)
              - column:
                  name: printed
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: cancelled
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: bill_amt
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: bill_no
                  type: VARCHAR(20)
              - column:
                  name: total_amount
                  type: DECIMAL(10,2)
              - column:
                  name: cgst
                  type: DECIMAL(10,2)
                  defaultValueNumeric: 0
              - column:
                  name: sgst
                  type: DECIMAL(10,2)
                  defaultValueNumeric: 0
              - column:
                  name: igst
                  type: DECIMAL(10,2)
                  defaultValueNumeric: 0
              - column:
                  name: paid
                  type: DECIMAL(10,2)
                  defaultValueNumeric: 0
              - column:
                  name: tagged
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - createIndex:
            indexName: idx_billing_bill_num
            tableName: billings
            columns:
              - column:
                  name: bill_num
        - createIndex:
            indexName: idx_billing_bill_date
            tableName: billings
            columns:
              - column:
                  name: bill_date
        - createIndex:
            indexName: idx_billing_client_id
            tableName: billings
            columns:
              - column:
                  name: client_id
        - createIndex:
            indexName: idx_billing_trp_num
            tableName: billings
            columns:
              - column:
                  name: trp_num
        - createIndex:
            indexName: idx_cancelled
            tableName: billings
            columns:
              - column:
                  name: cancelled

# Made with Bob