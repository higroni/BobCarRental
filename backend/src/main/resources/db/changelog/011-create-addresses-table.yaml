databaseChangeLog:
  - changeSet:
      id: 011-create-addresses-table
      author: bob
      changes:
        - createTable:
            tableName: addresses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: client_fk
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_addresses_client
                    references: clients(id)
              - column:
                  name: dept
                  type: VARCHAR(15)
              - column:
                  name: desc
                  type: VARCHAR(10)
              - column:
                  name: name
                  type: VARCHAR(40)
                  constraints:
                    nullable: false
              - column:
                  name: address1
                  type: VARCHAR(35)
              - column:
                  name: address2
                  type: VARCHAR(30)
              - column:
                  name: address3
                  type: VARCHAR(25)
              - column:
                  name: place
                  type: VARCHAR(20)
              - column:
                  name: city
                  type: VARCHAR(15)
              - column:
                  name: pin_code
                  type: VARCHAR(10)
              - column:
                  name: phone
                  type: VARCHAR(25)
              - column:
                  name: fax
                  type: VARCHAR(25)
              - column:
                  name: tagged
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: category
                  type: VARCHAR(20)
              - column:
                  name: company_name
                  type: VARCHAR(100)
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - createIndex:
            indexName: idx_address_client_id
            tableName: addresses
            columns:
              - column:
                  name: client_id
        - createIndex:
            indexName: idx_address_client_name
            tableName: addresses
            columns:
              - column:
                  name: client_id
              - column:
                  name: name
        - createIndex:
            indexName: idx_address_dept
            tableName: addresses
            columns:
              - column:
                  name: dept

# Made with Bob