databaseChangeLog:
  - changeSet:
      id: 007-create-bookings-table
      author: bob
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: book_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: today_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: ref
                  type: VARCHAR(15)
              - column:
                  name: time
                  type: VARCHAR(5)
              - column:
                  name: type_id
                  type: VARCHAR(5)
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_type_fk
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_bookings_vehicle_type
                    references: vehicle_types(id)
              - column:
                  name: client_id
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: client_fk
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_bookings_client
                    references: clients(id)
              - column:
                  name: info1
                  type: VARCHAR(50)
              - column:
                  name: info2
                  type: VARCHAR(50)
              - column:
                  name: info3
                  type: VARCHAR(50)
              - column:
                  name: info4
                  type: VARCHAR(50)
              - column:
                  name: tagged
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - createIndex:
            indexName: idx_booking_date
            tableName: bookings
            columns:
              - column:
                  name: book_date
        - createIndex:
            indexName: idx_today_date
            tableName: bookings
            columns:
              - column:
                  name: today_date
        - createIndex:
            indexName: idx_client_id
            tableName: bookings
            columns:
              - column:
                  name: client_id
        - createIndex:
            indexName: idx_type_id
            tableName: bookings
            columns:
              - column:
                  name: type_id

# Made with Bob