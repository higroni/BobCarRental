<mat-toolbar color="primary" class="app-header">
  <div class="header-content">
    <!-- Logo and App Name (clickable to go to dashboard) -->
    <div class="logo-section" (click)="goToDashboard()">
      <mat-icon class="app-logo">directions_car</mat-icon>
      <span class="app-name">Bob Car Rental</span>
    </div>

    <span class="spacer"></span>

    <!-- User Info and Actions -->
    <div class="user-section" *ngIf="currentUser">
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-button">
        <mat-icon>account_circle</mat-icon>
        <span class="username">{{ currentUser.username }}</span>
        <span class="role-badge" [class.admin]="isAdmin()">
          {{ getPrimaryRole() }}
        </span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="goToDashboard()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </div>
</mat-toolbar>
