<div class="user-list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <div class="header-content">
          <h2>User Management</h2>
          <button mat-raised-button color="primary" (click)="createUser()">
            <mat-icon>add</mat-icon>
            New User
          </button>
        </div>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <!-- Search Bar -->
      <mat-form-field class="search-field" appearance="outline">
        <mat-label>Search users</mat-label>
        <input matInput [(ngModel)]="searchTerm" (input)="applyFilter()" 
               placeholder="Search by username, email, name, or role">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <!-- Loading State -->
      <div *ngIf="isLoading" class="loading-container">
        <p>Loading users...</p>
      </div>

      <!-- Error State -->
      <div *ngIf="error" class="error-container">
        <mat-icon color="warn">error</mat-icon>
        <p>{{ error }}</p>
        <button mat-raised-button color="primary" (click)="loadUsers()">
          <mat-icon>refresh</mat-icon>
          Retry
        </button>
      </div>

      <!-- Users Table -->
      <div *ngIf="!isLoading && !error" class="table-container">
        <table mat-table [dataSource]="filteredUsers" class="users-table">
          
          <!-- Username Column -->
          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef>Username</th>
            <td mat-cell *matCellDef="let user">{{ user.username }}</td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let user">{{ user.email }}</td>
          </ng-container>

          <!-- Full Name Column -->
          <ng-container matColumnDef="fullName">
            <th mat-header-cell *matHeaderCellDef>Full Name</th>
            <td mat-cell *matCellDef="let user">{{ user.fullName || '-' }}</td>
          </ng-container>

          <!-- Roles Column -->
          <ng-container matColumnDef="roles">
            <th mat-header-cell *matHeaderCellDef>Roles</th>
            <td mat-cell *matCellDef="let user">
              <mat-chip-set>
                <mat-chip *ngFor="let role of user.roles" 
                          [class]="getRoleBadgeClass(role)">
                  {{ getRoleDisplay(role) }}
                </mat-chip>
              </mat-chip-set>
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="enabled">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let user">
              <mat-chip [class]="user.enabled ? 'status-active' : 'status-inactive'">
                {{ user.enabled ? 'Active' : 'Inactive' }}
              </mat-chip>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let user">
              <button mat-icon-button color="primary" 
                      (click)="editUser(user.id)"
                      matTooltip="Edit user">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" 
                      (click)="deleteUser(user.id, user.username)"
                      matTooltip="Delete user">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          <!-- No Data Row -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">
              <div class="no-data">
                <mat-icon>person_off</mat-icon>
                <p>No users found</p>
              </div>
            </td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
