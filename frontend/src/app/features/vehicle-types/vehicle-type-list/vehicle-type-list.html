<div class="vehicle-type-list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <h2>Vehicle Type Management</h2>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <!-- Toolbar -->
      <div class="toolbar">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Search by ID, name or description..." #input>
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="createVehicleType()">
          <mat-icon>add</mat-icon>
          New Vehicle Type
        </button>
      </div>

      <!-- Loading indicator -->
      <div *ngIf="isLoading" class="loading-container">
        <mat-spinner></mat-spinner>
      </div>

      <!-- Table -->
      <div class="table-container" *ngIf="!isLoading">
        <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2">

          <!-- Type ID Column -->
          <ng-container matColumnDef="typeId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Type ID</th>
            <td mat-cell *matCellDef="let type">{{ type.typeId }}</td>
          </ng-container>

          <!-- Type Name Column -->
          <ng-container matColumnDef="typeName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
            <td mat-cell *matCellDef="let type">{{ type.typeName }}</td>
          </ng-container>

          <!-- Description Column -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Description</th>
            <td mat-cell *matCellDef="let type">{{ type.description || '-' }}</td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="isActive">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
            <td mat-cell *matCellDef="let type">
              <mat-icon *ngIf="type.isActive" color="primary">check_circle</mat-icon>
              <mat-icon *ngIf="!type.isActive" color="warn">cancel</mat-icon>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let type">
              <button mat-icon-button color="primary" (click)="viewVehicleType(type)" matTooltip="View Details">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button color="accent" (click)="editVehicleType(type)" matTooltip="Edit">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteVehicleType(type)" matTooltip="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          <!-- No data row -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">
              No vehicle types found matching "{{ input.value }}"
            </td>
          </tr>
        </table>

        <mat-paginator 
          [pageSizeOptions]="[5, 10, 25, 100]"
          [pageSize]="10"
          showFirstLastButtons>
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
