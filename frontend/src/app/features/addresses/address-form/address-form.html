<div class="address-form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <h2>{{ isEditMode ? 'Edit' : 'New' }} Address</h2>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="loading" class="loading-container">
        <mat-spinner></mat-spinner>
      </div>

      <form [formGroup]="addressForm" (ngSubmit)="onSubmit()" *ngIf="!loading">
        <!-- Client ID and Department -->
        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Client ID</mat-label>
            <input matInput formControlName="clientId" placeholder="e.g., CLI001" maxlength="10">
            <mat-error *ngIf="addressForm.get('clientId')?.hasError('required')">
              Client ID is required
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Department</mat-label>
            <input matInput formControlName="dept" placeholder="e.g., Sales" maxlength="15">
          </mat-form-field>
        </div>

        <!-- Description and Name -->
        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Description</mat-label>
            <input matInput formControlName="desc" placeholder="Short description" maxlength="10">
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="Contact name" maxlength="40">
            <mat-error *ngIf="addressForm.get('name')?.hasError('required')">
              Name is required
            </mat-error>
          </mat-form-field>
        </div>

        <!-- Address Lines -->
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address Line 1</mat-label>
            <input matInput formControlName="address1" placeholder="Street address" maxlength="35">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address Line 2</mat-label>
            <input matInput formControlName="address2" placeholder="Apartment, suite, etc." maxlength="30">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address Line 3</mat-label>
            <input matInput formControlName="address3" placeholder="Additional address info" maxlength="25">
          </mat-form-field>
        </div>

        <!-- Place, City, Pin Code -->
        <div class="form-row">
          <mat-form-field appearance="outline" class="third-width">
            <mat-label>Place</mat-label>
            <input matInput formControlName="place" placeholder="Place" maxlength="20">
          </mat-form-field>

          <mat-form-field appearance="outline" class="third-width">
            <mat-label>City</mat-label>
            <input matInput formControlName="city" placeholder="City" maxlength="15">
          </mat-form-field>

          <mat-form-field appearance="outline" class="third-width">
            <mat-label>Pin Code</mat-label>
            <input matInput type="number" formControlName="pinCode" placeholder="Pin code">
          </mat-form-field>
        </div>

        <!-- Phone and Fax -->
        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Phone</mat-label>
            <input matInput formControlName="phone" placeholder="Phone number" maxlength="25">
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Fax</mat-label>
            <input matInput formControlName="fax" placeholder="Fax number" maxlength="25">
          </mat-form-field>
        </div>

        <!-- Category and Company Name -->
        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Category</mat-label>
            <input matInput formControlName="category" placeholder="Category" maxlength="20">
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Company Name</mat-label>
            <input matInput formControlName="companyName" placeholder="Company name" maxlength="100">
          </mat-form-field>
        </div>

        <!-- Active Status -->
        <div class="form-row">
          <mat-slide-toggle formControlName="isActive" color="primary">
            Active
          </mat-slide-toggle>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()" [disabled]="submitting">
            Cancel
          </button>
          <button mat-raised-button color="primary" type="submit" [disabled]="!addressForm.valid || submitting">
            <mat-spinner *ngIf="submitting" diameter="20"></mat-spinner>
            <span *ngIf="!submitting">{{ isEditMode ? 'Update' : 'Create' }}</span>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
